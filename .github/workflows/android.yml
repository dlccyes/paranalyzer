name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web bundle
        run: npm run build:mobile

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: apps/mobile/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Create or update rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete android-latest --yes 2>/dev/null || true
          gh release create android-latest \
            --title "Android App – latest build" \
            --notes "Debug APK for sideloading. Enable 'Install unknown apps' in Android settings, then download and install." \
            apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
